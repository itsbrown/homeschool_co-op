name: Payments CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  payments:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (payments scope)
        run: npm run check:payments

      - name: Test (payments subset)
        run: npm run test:payments
