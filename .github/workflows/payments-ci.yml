name: Payments CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  payments:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: asa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/asa_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/asa_test
      PAYMENT_PROCESSOR_ENABLED: "true"
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_test_payment_flow_harness' }}
      STRIPE_WEBHOOK_DEV_BYPASS: "false"
      STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      TESTING_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Push schema to test database
        run: node scripts/ci-db-push.mjs

      - name: Typecheck (payments scope)
        run: npm run check:payments

      - name: Test (payments subset)
        run: npm run test:payments
