name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Test suite (server integration + client jsdom)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: asa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/asa_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/asa_test
      TEST_BASE_URL: http://localhost:5000
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_test_payment_flow_harness' }}
      STRIPE_WEBHOOK_DEV_BYPASS: 'false'
      STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      TESTING_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
      PAYMENT_PROCESSOR_ENABLED: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Catches missing npm deps (e.g. qrcode) before db:push / dev server — same resolution as Replit after npm ci
      - name: Verify client bundle
        run: npx vite build

      - name: Push schema to test database
        run: npx drizzle-kit push --force

      - name: Verify core Postgres schema
        run: node scripts/verify-core-schema.mjs

      - name: Verify F001 schema
        run: node scripts/verify-f001-schema.mjs

      - name: Production-path integration (registration / locations)
        run: npm run test:server -- --runInBand --testPathPatterns=production-path --no-cache --forceExit

      - name: Start dev server
        run: |
          npm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          for i in {1..60}; do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1 || \
               curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Dev server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Dev server failed to start"
          cat /tmp/dev-server.log
          exit 1

      - name: Run full test suite (server + client)
        run: npm test

      - name: Upload dev server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-log
          path: /tmp/dev-server.log

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill $(cat /tmp/dev-server.pid) || true
          fi
