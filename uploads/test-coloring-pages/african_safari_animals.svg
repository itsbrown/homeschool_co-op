<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional African Safari Animals Coloring Page -->
  
  <!-- Background frame -->
  <rect x="30" y="30" width="964" height="964" fill="none" stroke="#000" stroke-width="3" rx="15"/>
  
  <!-- African savanna landscape background -->
  <path d="M30 600 Q200 580 400 590 T800 585 L994 590 L994 994 L30 994 Z" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Distant hills -->
  <path d="M30 450 Q150 420 300 440 Q450 460 600 430 Q750 450 850 440 Q950 430 994 440" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Large Elephant (main subject, center-left) -->
  <g transform="translate(150,350)">
    <!-- Body -->
    <ellipse cx="80" cy="60" rx="70" ry="45" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Head -->
    <ellipse cx="20" cy="40" rx="45" ry="35" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Trunk -->
    <path d="M-20 50 Q-40 70 -30 90 Q-20 110 -10 100 Q0 90 -5 80 Q-10 70 -15 60" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Trunk tip -->
    <ellipse cx="-8" cy="98" rx="6" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="10" cy="25" rx="25" ry="30" fill="none" stroke="#000" stroke-width="3"/>
    <ellipse cx="30" cy="30" rx="20" ry="25" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Eye -->
    <circle cx="25" cy="35" r="4" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Tusks -->
    <path d="M5 55 Q0 65 5 75" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M15 55 Q10 65 15 75" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Legs -->
    <rect x="40" y="105" width="15" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="60" y="105" width="15" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="80" y="105" width="15" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="100" y="105" width="15" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Feet -->
    <ellipse cx="47" cy="150" rx="12" ry="6" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="67" cy="150" rx="12" ry="6" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="87" cy="150" rx="12" ry="6" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="107" cy="150" rx="12" ry="6" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Tail -->
    <path d="M150 60 Q170 70 165 90" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="162" cy="92" rx="4" ry="8" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Giraffe (background, right side) -->
  <g transform="translate(650,200)">
    <!-- Body -->
    <ellipse cx="50" cy="180" rx="40" ry="30" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Long neck -->
    <rect x="35" y="80" width="30" height="100" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Head -->
    <ellipse cx="50" cy="60" rx="20" ry="25" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Horns -->
    <rect x="45" y="35" width="3" height="15" fill="none" stroke="#000" stroke-width="2"/>
    <rect x="55" y="35" width="3" height="15" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="46" cy="32" r="3" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="56" cy="32" r="3" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="45" cy="55" r="3" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="55" cy="55" r="3" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Legs -->
    <rect x="30" y="210" width="12" height="80" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="45" y="210" width="12" height="80" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="60" y="210" width="12" height="80" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="75" y="210" width="12" height="80" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Spots -->
    <circle cx="40" cy="100" r="5" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="60" cy="110" r="4" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="45" cy="130" r="6" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="65" cy="145" r="5" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="35" cy="160" r="4" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="55" cy="170" r="5" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="70" cy="185" r="4" fill="none" stroke="#000" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M90 180 Q110 190 105 210" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="103" cy="212" rx="3" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Lion (foreground, left side) -->
  <g transform="translate(80,480)">
    <!-- Body -->
    <ellipse cx="60" cy="40" rx="50" ry="25" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Head -->
    <circle cx="20" cy="30" r="25" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Mane -->
    <circle cx="20" cy="30" r="35" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Mane details -->
    <path d="M-10 20 Q-15 15 -8 25" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M5 5 Q0 0 10 8" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M35 5 Q40 0 30 8" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M50 20 Q55 15 48 25" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M50 40 Q55 45 48 35" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M35 55 Q40 60 30 52" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M5 55 Q0 60 10 52" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M-10 40 Q-15 45 -8 35" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Eyes -->
    <ellipse cx="15" cy="25" rx="3" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="25" cy="25" rx="3" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Nose -->
    <path d="M18 35 Q20 38 22 35" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Mouth -->
    <path d="M15 40 Q20 45 25 40" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Legs -->
    <rect x="35" y="65" width="12" height="35" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="50" y="65" width="12" height="35" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="65" y="65" width="12" height="35" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="80" y="65" width="12" height="35" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Paws -->
    <ellipse cx="41" cy="105" rx="8" ry="5" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="56" cy="105" rx="8" ry="5" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="71" cy="105" rx="8" ry="5" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="86" cy="105" rx="8" ry="5" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Tail -->
    <path d="M110 40 Q130 50 125 70 Q120 85 115 80" fill="none" stroke="#000" stroke-width="3"/>
    <ellipse cx="113" cy="82" rx="4" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Zebra (middle ground, center) -->
  <g transform="translate(400,420)">
    <!-- Body -->
    <ellipse cx="50" cy="50" rx="45" ry="30" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Head -->
    <ellipse cx="10" cy="35" rx="20" ry="15" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Neck -->
    <path d="M30 35 Q35 40 40 45" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Ears -->
    <ellipse cx="5" cy="25" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="15" cy="25" rx="6" ry="10" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="8" cy="32" r="2" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="12" cy="32" r="2" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Legs -->
    <rect x="30" y="80" width="10" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="45" y="80" width="10" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="60" y="80" width="10" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <rect x="75" y="80" width="10" height="40" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Hooves -->
    <ellipse cx="35" cy="125" rx="6" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="50" cy="125" rx="6" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="65" cy="125" rx="6" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="80" cy="125" rx="6" ry="4" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Stripes -->
    <path d="M5 30 Q25 35 45 40" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M8 40 Q28 45 48 50" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M12 50 Q32 55 52 60" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M15 60 Q35 65 55 70" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M32 85 Q35 90 38 85" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M47 85 Q50 90 53 85" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M62 85 Q65 90 68 85" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M77 85 Q80 90 83 85" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Mane -->
    <path d="M20 20 Q25 15 30 25 Q25 30 20 25" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Tail -->
    <path d="M95 50 Q115 60 110 80" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="108" cy="82" rx="3" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Acacia tree (classic African tree) -->
  <g transform="translate(500,300)">
    <!-- Trunk -->
    <rect x="0" y="200" width="20" height="100" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Tree canopy (flat-top acacia style) -->
    <ellipse cx="10" cy="180" rx="80" ry="25" fill="none" stroke="#000" stroke-width="3"/>
    <!-- Canopy details -->
    <path d="M-60 170 Q-40 160 -20 170 Q0 160 20 170 Q40 160 60 170" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M-50 185 Q-30 175 -10 185 Q10 175 30 185 Q50 175 70 185" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Branches -->
    <path d="M10 200 Q-10 190 -20 180" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M10 210 Q30 200 40 190" fill="none" stroke="#000" stroke-width="2"/>
    <path d="M15 220 Q35 210 45 200" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Safari jeep in distance -->
  <g transform="translate(750,500)">
    <!-- Vehicle body -->
    <rect x="0" y="20" width="60" height="25" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Wheels -->
    <circle cx="12" cy="50" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="48" cy="50" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Windshield -->
    <rect x="5" y="10" width="25" height="15" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Side windows -->
    <rect x="35" y="15" width="20" height="10" fill="none" stroke="#000" stroke-width="1.5"/>
    <!-- Roof bars -->
    <line x1="10" y1="10" x2="10" y2="5" stroke="#000" stroke-width="2"/>
    <line x1="25" y1="10" x2="25" y2="5" stroke="#000" stroke-width="2"/>
    <line x1="10" y1="5" x2="25" y2="5" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- African sun -->
  <circle cx="850" cy="120" r="30" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Sun rays -->
  <path d="M850 70 L850 50 M900 120 L920 120 M850 170 L850 190 M800 120 L780 120" stroke="#000" stroke-width="2"/>
  <path d="M871 99 L885 85 M871 141 L885 155 M829 99 L815 85 M829 141 L815 155" stroke="#000" stroke-width="2"/>
  
  <!-- Clouds -->
  <g transform="translate(200,100)">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="18" cy="-5" rx="15" ry="10" fill="none" stroke="#000" stroke-width="2"/>
    <ellipse cx="12" cy="8" rx="25" ry="15" fill="none" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Grass and vegetation -->
  <path d="M50 600 Q60 590 70 600 Q80 590 90 600 Q100 590 110 600" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M200 610 Q210 600 220 610 Q230 600 240 610" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M350 605 Q360 595 370 605 Q380 595 390 605" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M500 615 Q510 605 520 615 Q530 605 540 615" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M700 608 Q710 598 720 608 Q730 598 740 608" fill="none" stroke="#000" stroke-width="1.5"/>

</svg>