<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional George Washington Coloring Page -->
  
  <!-- Background frame -->
  <rect x="50" y="50" width="924" height="924" fill="none" stroke="#000" stroke-width="3" rx="20"/>
  
  <!-- Mount Vernon mansion in background -->
  <rect x="650" y="200" width="250" height="120" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M650 200 L775 150 L900 200 Z" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Mansion columns -->
  <rect x="680" y="240" width="15" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="720" y="240" width="15" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="760" y="240" width="15" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="800" y="240" width="15" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="840" y="240" width="15" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Mansion windows -->
  <rect x="700" y="220" width="20" height="25" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="740" y="220" width="20" height="25" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="780" y="220" width="20" height="25" fill="none" stroke="#000" stroke-width="1.5"/>
  <rect x="820" y="220" width="20" height="25" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- George Washington portrait (main subject) -->
  <!-- Head and face -->
  <ellipse cx="350" cy="300" rx="80" ry="100" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Hair/wig (powdered colonial style) -->
  <path d="M270 250 Q280 200 350 200 Q420 200 430 250 Q425 280 400 290 Q350 300 300 290 Q275 280 270 250 Z" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Hair curls on sides -->
  <circle cx="290" cy="270" r="15" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="410" cy="270" r="15" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Facial features -->
  <ellipse cx="325" cy="280" rx="4" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="375" cy="280" rx="4" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M340 320 Q350 330 360 320" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="350" cy="310" rx="8" ry="4" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- Colonial coat/jacket -->
  <path d="M280 400 Q350 380 420 400 L430 550 Q420 580 350 580 Q280 580 270 550 Z" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Coat buttons -->
  <circle cx="340" cy="420" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="340" cy="450" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="340" cy="480" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="340" cy="510" r="4" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Coat lapels -->
  <path d="M300 400 Q320 410 340 400" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M360 400 Q380 410 400 400" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Arms -->
  <ellipse cx="250" cy="480" rx="25" ry="60" fill="none" stroke="#000" stroke-width="3"/>
  <ellipse cx="450" cy="480" rx="25" ry="60" fill="none" stroke="#000" stroke-width="3"/>
  <!-- Hands -->
  <ellipse cx="240" cy="540" rx="15" ry="20" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="460" cy="540" rx="15" ry="20" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- American flag in background -->
  <rect x="100" y="150" width="120" height="80" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Flag stripes -->
  <line x1="100" y1="160" x2="220" y2="160" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="170" x2="220" y2="170" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="180" x2="220" y2="180" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="190" x2="220" y2="190" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="200" x2="220" y2="200" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="210" x2="220" y2="210" stroke="#000" stroke-width="1.5"/>
  <line x1="100" y1="220" x2="220" y2="220" stroke="#000" stroke-width="1.5"/>
  <!-- Flag canton (star field area) -->
  <rect x="100" y="150" width="50" height="45" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Stars in canton -->
  <polygon points="115,160 118,167 125,167 120,172 122,179 115,175 108,179 110,172 105,167 112,167" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="135,160 138,167 145,167 140,172 142,179 135,175 128,179 130,172 125,167 132,167" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="125,175 128,182 135,182 130,187 132,194 125,190 118,194 120,187 115,182 122,182" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Cherry tree (referencing the famous legend) -->
  <rect x="500" y="400" width="15" height="120" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Tree trunk texture -->
  <line x1="505" y1="420" x2="505" y2="520" stroke="#000" stroke-width="1"/>
  <line x1="510" y1="430" x2="510" y2="510" stroke="#000" stroke-width="1"/>
  <!-- Tree foliage -->
  <circle cx="507" r="40" cy="380" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="490" r="25" cy="360" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="525" r="30" cy="370" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Cherries on tree -->
  <circle cx="480" cy="370" r="3" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="530" cy="365" r="3" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="510" cy="355" r="3" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- Quill pen (symbol of founding documents) -->
  <path d="M150 600 Q180 590 200 580" fill="none" stroke="#000" stroke-width="2"/>
  <ellipse cx="145" cy="605" rx="8" ry="3" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Quill feather details -->
  <path d="M160 595 Q170 590 175 585" fill="none" stroke="#000" stroke-width="1"/>
  <path d="M165 600 Q175 595 180 590" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Scroll/document -->
  <rect x="120" y="650" width="150" height="80" fill="none" stroke="#000" stroke-width="2" rx="10"/>
  <!-- Document text lines -->
  <line x1="140" y1="670" x2="250" y2="670" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="685" x2="240" y2="685" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="700" x2="245" y2="700" stroke="#000" stroke-width="1"/>
  <line x1="140" y1="715" x2="230" y2="715" stroke="#000" stroke-width="1"/>
  
  <!-- Colonial hat -->
  <ellipse cx="150" cy="350" rx="40" ry="15" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M110 350 Q150 320 190 350" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Hat buckle -->
  <rect x="140" y="340" width="20" height="15" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="145" y="345" width="10" height="5" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Ground line -->
  <path d="M50 580 Q200 570 400 580 Q600 575 800 580 Q900 585 974 580" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Title banner -->
  <rect x="200" y="80" width="400" height="40" fill="none" stroke="#000" stroke-width="2" rx="5"/>
  <path d="M220 100 Q240 90 260 100 M280 90 Q300 100 320 90 M340 100 Q360 90 380 100 M400 90 Q420 100 440 90 M460 100 Q480 90 500 100 M520 90 Q540 100 560 90 M580 100" stroke="#000" stroke-width="1.5" fill="none"/>

</svg>