<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background stars -->
  <circle cx="100" cy="80" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="200" cy="120" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="350" cy="90" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="450" cy="70" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="550" cy="110" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="650" cy="85" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="750" cy="95" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="850" cy="75" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="920" cy="130" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="80" cy="200" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="900" cy="250" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="50" cy="350" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="950" cy="400" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="70" cy="500" r="1.5" fill="none" stroke="#000000" stroke-width="1.5"/>
  <circle cx="930" cy="550" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Rocket Ship -->
  <g transform="translate(150,200)">
    <!-- Main body -->
    <rect x="0" y="60" width="80" height="200" rx="10" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Nose cone -->
    <polygon points="40,60 10,30 70,30" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Window -->
    <circle cx="40" cy="120" r="25" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="40" cy="120" r="20" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Fins -->
    <polygon points="0,200 -20,280 0,260" fill="none" stroke="#000000" stroke-width="3"/>
    <polygon points="80,200 100,280 80,260" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Engine flames -->
    <polygon points="20,260 10,320 30,300 40,330 50,300 60,320 70,300" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Details -->
    <rect x="10" y="180" width="60" height="8" fill="none" stroke="#000000" stroke-width="1.5"/>
    <rect x="10" y="200" width="60" height="8" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Astronaut -->
  <g transform="translate(400,350)">
    <!-- Helmet -->
    <circle cx="40" cy="40" r="35" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="40" cy="40" r="30" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Head inside helmet -->
    <circle cx="40" cy="45" r="18" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="35" cy="42" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="45" cy="42" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Mouth -->
    <path d="M 35 50 Q 40 53 45 50" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Body -->
    <rect x="15" y="75" width="50" height="80" rx="8" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Control panel -->
    <rect x="25" y="95" width="30" height="20" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="30" cy="105" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="40" cy="105" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="50" cy="105" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Arms -->
    <rect x="-5" y="85" width="20" height="40" rx="8" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="65" y="85" width="20" height="40" rx="8" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Gloves -->
    <circle cx="5" cy="125" r="12" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="75" cy="125" r="12" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Legs -->
    <rect x="22" y="155" width="15" height="50" rx="6" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="43" y="155" width="15" height="50" rx="6" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Boots -->
    <ellipse cx="30" cy="205" rx="12" ry="8" fill="none" stroke="#000000" stroke-width="3"/>
    <ellipse cx="50" cy="205" rx="12" ry="8" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Jetpack -->
    <rect x="5" y="85" width="70" height="45" rx="8" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Earth -->
  <g transform="translate(650,150)">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Continents -->
    <path d="M 20 40 Q 30 35 45 40 Q 55 45 60 35 Q 70 30 80 40 Q 90 50 85 65 Q 80 75 70 80 Q 60 85 45 80 Q 30 75 25 65 Q 20 55 20 40 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M 35 50 Q 40 45 50 50 Q 55 55 50 65 Q 45 70 35 65 Q 30 60 35 50 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M 65 55 Q 75 50 85 60 Q 80 70 70 70 Q 65 65 65 55 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Moon -->
  <g transform="translate(750,400)">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Craters -->
    <circle cx="30" cy="30" r="8" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="50" cy="35" r="5" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="35" cy="55" r="6" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="55" cy="50" r="4" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="25" cy="50" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Mars -->
  <g transform="translate(100,450)">
    <circle cx="45" cy="45" r="40" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Surface features -->
    <path d="M 15 35 Q 25 30 35 35 Q 45 40 55 35 Q 65 30 75 40" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M 20 55 Q 30 50 40 55 Q 50 60 60 55 Q 70 50 75 60" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Polar ice cap -->
    <path d="M 35 15 Q 45 10 55 15 Q 50 20 45 18 Q 40 20 35 15 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Saturn -->
  <g transform="translate(450,650)">
    <circle cx="60" cy="60" r="45" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Rings -->
    <ellipse cx="60" cy="60" rx="70" ry="15" fill="none" stroke="#000000" stroke-width="3"/>
    <ellipse cx="60" cy="60" rx="60" ry="12" fill="none" stroke="#000000" stroke-width="1.5"/>
    <ellipse cx="60" cy="60" rx="80" ry="18" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Planet bands -->
    <path d="M 25 45 Q 60 40 95 45" fill="none" stroke="#000000" stroke-width="1.5"/>
    <path d="M 30 75 Q 60 70 90 75" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Comet -->
  <g transform="translate(600,50)">
    <!-- Comet head -->
    <ellipse cx="20" cy="20" rx="15" ry="12" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Tail -->
    <path d="M 35 20 Q 80 10 120 5 Q 100 15 80 25 Q 60 30 35 25 Z" fill="none" stroke="#000000" stroke-width="3"/>
    <path d="M 30 15 Q 70 5 110 0 Q 90 10 70 20 Q 50 25 30 20 Z" fill="none" stroke="#000000" stroke-width="1.5"/>
    <!-- Nucleus details -->
    <circle cx="18" cy="18" r="3" fill="none" stroke="#000000" stroke-width="1.5"/>
    <circle cx="22" cy="22" r="2" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>

  <!-- Additional decorative stars -->
  <g stroke="#000000" stroke-width="1.5" fill="none">
    <polygon points="300,300 305,310 315,310 307,318 310,328 300,322 290,328 293,318 285,310 295,310"/>
    <polygon points="800,300 805,310 815,310 807,318 810,328 800,322 790,328 793,318 785,310 795,310"/>
    <polygon points="200,600 205,610 215,610 207,618 210,628 200,622 190,628 193,618 185,610 195,610"/>
    <polygon points="850,750 855,760 865,760 857,768 860,778 850,772 840,778 843,768 835,760 845,760"/>
  </g>

  <!-- Space station -->
  <g transform="translate(300,500)">
    <!-- Main hub -->
    <circle cx="50" cy="50" r="25" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Solar panels -->
    <rect x="0" y="40" width="30" height="20" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="70" y="40" width="30" height="20" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Panel details -->
    <line x1="5" y1="45" x2="25" y2="45" stroke="#000000" stroke-width="1.5"/>
    <line x1="5" y1="50" x2="25" y2="50" stroke="#000000" stroke-width="1.5"/>
    <line x1="5" y1="55" x2="25" y2="55" stroke="#000000" stroke-width="1.5"/>
    <line x1="75" y1="45" x2="95" y2="45" stroke="#000000" stroke-width="1.5"/>
    <line x1="75" y1="50" x2="95" y2="50" stroke="#000000" stroke-width="1.5"/>
    <line x1="75" y1="55" x2="95" y2="55" stroke="#000000" stroke-width="1.5"/>
    <!-- Connecting arms -->
    <rect x="30" y="47" width="20" height="6" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="70" y="47" width="20" height="6" fill="none" stroke="#000000" stroke-width="3"/>
    <!-- Station details -->
    <circle cx="50" cy="50" r="15" fill="none" stroke="#000000" stroke-width="1.5"/>
    <rect x="45" y="42" width="10" height="16" fill="none" stroke="#000000" stroke-width="1.5"/>
  </g>
</svg>