    <polygon points="440,370 450,350 460,370" stroke-width="3"/>
    <circle cx="435" cy="375" r="3" fill="black"/>
    <circle cx="445" cy="375" r="3" fill="black"/>
    <path d="M 430 385 Q 440 390 450 385" stroke-width="2"/>
    
