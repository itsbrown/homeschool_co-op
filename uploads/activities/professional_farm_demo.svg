      <circle cx="260" cy="100" r="25"/>
      <circle cx="215" cy="80" r="20"/>
      <circle cx="245" cy="80" r="20"/>
      
      <circle cx="600" cy="120" r="20"/>
      <circle cx="625" cy="120" r="25"/>
      <circle cx="650" cy="120" r="20"/>
