    <rect x="280" y="320" width="50" height="40" stroke-width="2"/>
    <path d="M 280 340 L 330 340 M 305 320 L 305 360" stroke-width="2"/>
    
    <!-- Cow -->
    <ellipse cx="500" cy="400" rx="80" ry="50" stroke-width="4"/>
    <circle cx="450" cy="380" r="35" stroke-width="4"/>
